{% load compress %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="title" content="Squirrelco">
    <meta name="description" content="The HSBXL ISP">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://squirrelco.net/">
    <meta property="og:title" content="Squirrelco">
    <meta property="og:description" content="The HSBXL ISP">
    <meta property="og:image" content="{% static 'images/squirrel-white.png' %}">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://squirrelco.net">
    <meta property="twitter:title" content="Squirrelco">
    <meta property="twitter:description" content="The HSBXL ISP">
    <meta property="twitter:image" content="{% static 'images/squirrel-white.png' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Squirrelco{% endblock %}</title>
    {% compress css %}
        <link rel="stylesheet" href="{% static 'src/output.css' %}">
    {% endcompress %}
</head>
<body>
    {% block content %}
    {% endblock content %}
</body>
</html>
